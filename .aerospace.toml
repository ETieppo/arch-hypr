after-startup-command = ["exec-and-forget sketchybar"]
exec-on-workspace-change = [
  "/bin/bash",
  "-c",
  "sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE",
  "exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=0"
]
start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 300
default-root-container-layout = "tiles"
default-root-container-orientation = "auto"
on-focused-monitor-changed = ["move-mouse monitor-lazy-center"]
automatically-unhide-macos-hidden-apps = true

[[on-window-detected]]
if.app-name-regex-substring = "finder"
run = "layout floating"

[[on-window-detected]]
if.app-name-regex-substring = "clock"
run = "layout floating"

[[on-window-detected]]
if.app-name-regex-substring = "riot client"
run = "layout floating"

[[on-window-detected]]
if.app-name-regex-substring = "logi options+"
run = "layout floating"

[[on-window-detected]]
run = ["layout tiles", "join-with right"]

[key-mapping]
preset = "qwerty"

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

[mode.main.binding]
alt-ctrl-shift-f = "fullscreen"
alt-ctrl-f = "layout floating tiling"
alt-shift-left = "join-with left"
alt-shift-down = "join-with down"
alt-shift-up = "join-with up"
alt-shift-right = "join-with right"
alt-ctrl-left = "focus-monitor prev"
alt-ctrl-right = "focus-monitor next"
alt-slash = "layout tiles horizontal vertical"
alt-comma = "layout accordion horizontal vertical"
cmd-h = "focus left"
cmd-j = "focus down"
cmd-k = "focus up"
cmd-l = "focus right"
cmd-shift-h = "move left"
cmd-shift-j = "move down"
cmd-shift-k = "move up"
cmd-shift-l = "move right"
alt-shift-minus = "resize smart -50"
alt-shift-equal = "resize smart +50"
alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-5 = "workspace 5"
alt-6 = "workspace 6"
alt-7 = "workspace 7"
alt-8 = "workspace 8"
alt-9 = "workspace 9"
alt-shift-1 = "move-node-to-workspace 1 --focus-follows-window"
alt-shift-2 = "move-node-to-workspace 2 --focus-follows-window"
alt-shift-3 = "move-node-to-workspace 3 --focus-follows-window"
alt-shift-4 = "move-node-to-workspace 4 --focus-follows-window"
alt-shift-5 = "move-node-to-workspace 5 --focus-follows-window"
alt-shift-6 = "move-node-to-workspace 6 --focus-follows-window"
alt-shift-7 = "move-node-to-workspace 7 --focus-follows-window"
alt-shift-8 = "move-node-to-workspace 8 --focus-follows-window"
alt-shift-9 = "move-node-to-workspace 9 --focus-follows-window"
alt-tab = "workspace-back-and-forth"
alt-shift-tab = "move-workspace-to-monitor --wrap-around next"
alt-shift-semicolon = "mode service"
alt-shift-enter = "mode apps"

[mode.service.binding]
esc = ["reload-config", "mode main"]
r = ["flatten-workspace-tree", "mode main"]  # reset layout
f = [
  "layout floating tiling",
  "mode main"
]  # Toggle between floating and tiling layout
backspace = ["close-all-windows-but-current", "mode main"]

[mode.apps.binding]
alt-t = ["exec-and-forget open -a /Applications/Ghostty.app", "mode main"]

[workspace-to-monitor-force-assignment]
1 = "^Built-in.*$"
2 = "^DELL U.*$"
3 = "^DELL S.*$"
# 4 = '^dell$'
#     5 = 'main'
#     6 = '^elgato$'
