[buildPlans.IosevkaCustom]
family = "Iosevka Custom"
spacing = "normal"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

  [buildPlans.IosevkaCustom.variants]
  inherits = "ss04"

    [buildPlans.IosevkaCustom.variants.design]
    one = "base-top-cut"
    two = "curly-neck-serifless"
    three = "flat-top-serifed"
    four = "open-non-crossing-serifless"
    five = "upright-flat-serifless"
    six = "straight-bar"
    seven = "bend-serifed"
    eight = "crossing"
    zero = "tall-reverse-slashed-cutout"
    capital-d = "standard-serifless"
    capital-e = "top-left-serifed"
    capital-f = "top-left-serifed"
    capital-g = "toothed-serifless-hooked"
    capital-h = "top-left-bottom-right-serifed"
    capital-i = "serifed"
    capital-j = "descending-flat-hook-serifed"
    capital-k = "symmetric-connected-bottom-right-serifed"
    capital-l = "motion-serifed"
    capital-n = "asymmetric-serifless"
    capital-q = "detached-bend-tailed"
    capital-r = "straight-open-top-left-and-bottom-right-serifed"
    capital-s = "serifless"
    capital-t = "serifless"
    capital-u = "toothed-serifed"
    capital-v = "straight-motion-serifed"
    capital-w = "rounded-vertical-sides-motion-serifed"
    capital-x = "straight-bilateral-motion-serifed"
    capital-y = "straight-motion-serifed"
    capital-z = "straight-bottom-serifed-with-horizontal-crossbar"
    e = "rounded"
    f = "flat-hook-tailed"
    g = "double-storey-open"
    h = "tailed-motion-serifed"
    k = "symmetric-connected-top-left-and-bottom-right-serifed"
    l = "serifed-semi-tailed"
    m = "top-left-and-bottom-right-serifed"
    n = "tailed-serifed"
    t = "hookless-asymmetric"
    u = "toothed-serifless"
    w = "straight-vertical-sides-serifless"
    x = "semi-chancery-curly-serifless"
    z = "straight-bottom-serifed-with-horizontal-crossbar"
    punctuation-dot = "square"
    asterisk = "hex-low"
    underscore = "high"
    caret = "low"
    ascii-grave = "raised-inverse-comma"
    brace = "curly-flat-boundary"
    guillemet = "curly"
    number-sign = "upright-open"
    ampersand = "upper-open"
    at = "fourfold"
    dollar = "through"
    cent = "bar-interrupted-cap"
    percent = "dots"
    decorative-angle-brackets = "short"
    lig-ltgteq = "slanted"
    lig-neq = "vertical"
    lig-equal-chain = "without-notch"
    lig-single-arrow-bar = "without-notch"

[buildPlans.IosevkaCustom.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.IosevkaCustom.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.IosevkaCustom.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.IosevkaCustom.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
