monitor = eDP-1,1920x1080@144,auto,1
monitor = HDMI-A-1, preferred, auto-left, 1

$terminal = wezterm
$fileManager = thunar
$menu = rofi -show drun -theme ~/.config/rofi/menu.rasi

exec-once = swaync
exec-once = waybar
exec-once = hyprpaper
exec-once = sleep 1 && darkman set dark
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# exec-once = nm-applet &
exec-once = gammastep
exec-once = mpvpaper -o 'no-audio loop hwdec=auto vo=dmabuf-wayland' '*' '~/.local/share/wallpapers/totoro.mp4'

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

general {
    gaps_in = 6
    gaps_out = 6
    border_size = 1
    col.active_border = rgba(33ccffee) 0x33CC rgba(33ccffee) 45deg
    col.inactive_border = rgba(33ccffee) 0x33CC rgba(33ccffee) 45deg
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 12
    active_opacity = 1.0
    inactive_opacity = 1

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

input {
    kb_layout = us
    kb_variant = altgr-intl
    kb_model =
    kb_options = ctrl:swap_lctl_lalt_lwin
    kb_rules =
    repeat_rate = 35
    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace
device {
    name = epic-mouse-v1
    sensitivity = 1
}

$mainMod = ALT

bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, SPACE, exec, $menu

bind = l_meta shift, h, movefocus, l
bind = l_meta shift, l, movefocus, r
bind = l_meta shift, k, movefocus, u
bind = l_meta shift, j, movefocus, d
bind = $mainMod, right, sendshortcut, , END, active
bind = $mainMod, left, sendshortcut, , HOME, active
bind = $mainMod SHIFT, left, sendshortcut, SHIFT, HOME, active
bind = $mainMod SHIFT, right, sendshortcut, SHIFT, END, active
bind = $mainMod, up, sendshortcut, CTRL, HOME, active
bind = $mainMod, down, sendshortcut, CTRL, END, active
bind = $mainMod SHIFT, up, sendshortcut, CTRL SHIFT, HOME, active
bind = $mainMod SHIFT, down, sendshortcut, CTRL SHIFT, END, active
bind = $mainMod, A, sendshortcut, CTRL, A, active
bind = $mainMod, C, sendshortcut, CTRL, C, active
bind = $mainMod, V, sendshortcut, CTRL, V, active
bind = $mainMod, R, sendshortcut, CTRL, R, active
bind = $mainMod, N, sendshortcut, CTRL, N, active
bind = $mainMod SHIFT, N, sendshortcut, CTRL SHIFT, N, active 
bind = $mainMod, W, sendshortcut, CTRL, W, active
bind = $mainMod, F, sendshortcut, CTRL, F, active
bind = l_ctrl, Backspace, sendshortcut, ,Delete,
bind = CTRL, V, sendshortcut, SUPER, V, active
bind = SUPER, up, sendshortcut, ALT, up, active
bind = SUPER, down, sendshortcut, ALT, down, active

bind = l_meta, 1, workspace, 1
bind = l_meta, 2, workspace, 2
bind = l_meta, 3, workspace, 3
bind = l_meta, 4, workspace, 4
bind = l_meta, 5, workspace, 5
bind = l_meta, 6, workspace, 6
bind = l_meta, 7, workspace, 7
bind = l_meta, 8, workspace, 8
bind = l_meta, 9, workspace, 9
bind = l_meta, 0, workspace, 10
bind = l_meta SHIFT, 1, movetoworkspace, 1
bind = l_meta SHIFT, 2, movetoworkspace, 2
bind = l_meta SHIFT, 3, movetoworkspace, 3
bind = l_meta SHIFT, 4, movetoworkspace, 4
bind = l_meta SHIFT, 5, movetoworkspace, 5
bind = l_meta SHIFT, 6, movetoworkspace, 6
bind = l_meta SHIFT, 7, movetoworkspace, 7
bind = l_meta SHIFT, 8, movetoworkspace, 8
bind = l_meta SHIFT, 9, movetoworkspace, 9
bind = l_meta SHIFT, 0, movetoworkspace, 10

bind = l_meta SHIFT, S, movetoworkspace, special:magic
bind = l_meta SHIFT, F, fullscreen
bind = l_meta, S, togglespecialworkspace, magic
bind = l_meta, P, exec, hyprpicker
#bindm = r_ctrl, mouse:272, movewindow
#bindm = r_ctrl, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 1%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 1%-

bind = , Print, exec, grim
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# bind = $mainMod, M, exit,
# bind = $mainMod, E, exec, $fileManager
# bind = $mainMod, F, togglefloating,
# bind = $mainMod, P, pseudo, # dwindle
# bind = $mainMod, J, togglesplit, # dwindle

windowrule {
  name=thunar
  match:class = thunar
  float = true
  size = 900 500
}
